<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 영어 학습 서비스</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header class="header">
      <h1>AI 영어 학습 도우미</h1>
      <p>상황별 회화, 문장 첨삭, 여행 영어, 영어 퀴즈를 AI와 함께 연습해보세요.</p>
    </header>

    <main class="main">
      <section class="menu-section">
        <button class="menu-btn active" onclick="setMode('conversation')">
          상황별 영어회화
        </button>
        <button class="menu-btn" onclick="setMode('correction')">
          영어 문장 첨삭
        </button>
        <button class="menu-btn" onclick="setMode('travel')">
          여행 영어
        </button>
        <button class="menu-btn" onclick="setMode('quiz')">
          영어 퀴즈
        </button>
      </section>

      <section class="input-section">
        <h2 id="modeTitle">상황별 영어회화</h2>
        <p id="modeDescription">
          원하는 상황을 입력하면 AI가 영어 역할극을 시작합니다.
        </p>

        <textarea
          id="userInput"
          placeholder="예: 카페에서 아이스 아메리카노 주문 연습하고 싶어"
        ></textarea>

        <button class="send-btn" onclick="sendMessage()">
          AI에게 보내기
        </button>
      </section>

      <section class="chat-section">
        <h3>대화 내용</h3>

        <div id="chatBox" class="chat-box">
         <div class="message ai-message">
           안녕하세요! 원하는 메뉴를 선택하고 영어 연습을 시작해보세요.
         </div>
       </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
